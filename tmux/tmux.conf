bind C-r source-file $XDG_CONFIG_HOME/tmux/tmux.conf \; display "Reloaded!"

set display-time 1000

# #1c1c1c
# #89faa0
# #f6fa89
# #facb89
# #faa589
# #b728c7
# #1a1a99
set-option -g @prefix_border_color "#b728c7"
set-option -g @normal_border_color "#0000b3"
set-option -g @zoom_border_color "#4db300"
set-option -g @popup_border_color "#b728c7"
set-option -g @pane_in_mode_color "#e6b300"

#############################
# other settings
#############################

# prefixキーをC-aに変更する
set -g prefix C-t

# C-bのキーバインドを解除する
unbind C-b

# キーストロークのディレイを減らす
set -sg escape-time 1

# C-t*2でtmux内のプログラムにC-tを送る
bind C-t send-prefix

# '|' でペインを縦に、'-' でペインを横に分割する
bind | split-window -h -c '#{pane_current_path}'
bind - split-window -v -c '#{pane_current_path}'
bind = select-layout even-horizontal
bind + select-layout main-vertical

# Vimのキーバインドでペインを移動する
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -r C-h select-window -t :-
bind -r C-l select-window -t :+

# sessionの作成（セッション名はprefix -> $で変更可能）
bind c new-session \; split-window -h \; select-layout main-vertical \; select-pane -L
bind-key r command-prompt -p "RENAME: #S =>" "rename-session '%%'"

# window の作成
# bind t new-window

# Vimのキーバインドでペインをリサイズする
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ペインを数字で選べるようにする
# ref: https://qiita.com/pocari/items/b1828c8aea8e3545cadd
bind C-o display-panes
# bind q display-panes
set -g display-panes-time 10000

# 全ペイン同期をトグルする
# ref: https://qiita.com/waieneiaw/items/22ed18809739c9a69f25
bind a setw synchronize-panes \; display "synchronize-panes #{?pane_synchronized,on,off}"

# popup の装飾
set -gw popup-border-style "fg=#{@popup_border_color},bg=#{@popup_border_color}"

# -EオプションがないとESCでpopupがクローズしてしまう
# bind g popup -w100% -h93% -E -d "#{pane_current_path}" lazygit
bind f popup -w100% -h93% -E -d "#{pane_current_path}" vifm
bind i popup -w100% -h93% -E -d "#{pane_current_path}" tmnew-repo-session
bind q popup -w100% -h93% -E -d "#{pane_current_path}" tmuxkillf
bind s popup -w100% -h93% -E -d "#{pane_current_path}" tmux-session-fzf
bind m popup -x 0 -y 0 -w100% -h80% -E -d "$HOME/.memo" nvim $HOME/.memo/global-memo.md

# 1. 'l' を押した時に一時的に 'git-table' という名前のテーブルに切り替える
# 2. 'git-table' テーブル内で 'g' が押された時の挙動を定義する
bind-key g display-message "INPUT: g- ..." \; switch-client -T git-table
bind-key -T git-table l popup -w100% -h93% -E -d "#{pane_current_path}" lazygit
bind-key -T git-table d popup -w100% -h93% -E -d "#{pane_current_path}" git-diff-view-nvim
bind-key -T git-table D popup -w100% -h93% -E -d "#{pane_current_path}" git-diff-stashed-view-nvim
bind-key -T git-table s popup -w100% -h93% -E -d "#{pane_current_path}" git-diff-stashed-view-nvim

bind p switch-client -l
bind -r N switch-client -p
bind -r n switch-client -n

# マウス操作を有効にする
setw -g mouse on

set -g default-terminal "screen-256color"  # 基本的にはscreen-256colorかtmux-256colorを設定
set-option -ga terminal-overrides ",$TERM:Tc" # tmuxを起動していない時のzshでの$TERMの値を指定

# ステータスバーの色を設定する
# set -g status-style fg=white,bg=black

# ウィンドウリストの色を設定する
# setw -g window-status-style fg=cyan,bg=default,dim
# アクティブなウィンドウを目立たせる
# setw -g window-status-current-style fg=white,bg=red,bright

# pane border
set-option -g pane-border-status bottom

set-option -g pane-border-style "fg=white,bg=black"
set-option -g pane-active-border-style "#{?client_prefix,fg=#{@prefix_border_color} bg=#{@prefix_border_color},\
#{?window_zoomed_flag,fg=#{@zoom_border_color} bg=#{@zoom_border_color},\
#{?pane_in_mode,fg=#{@pane_in_mode_color} bg=#{@pane_in_mode_color},\
fg=#{@normal_border_color} bg=#{@normal_border_color}}}\
}"

set-option -g pane-border-format "#{?pane_active,#[bold]\
#{?client_prefix,#[fg=#{@prefix_border_color}],#{?window_zoomed_flag,#[fg=#{@zoom_border_color}],#{?pane_in_mode,#[fg=#{@pane_in_mode_color}],#[fg=#{@normal_border_color}]}}}\
#[bg=#89faa0]\
#[fg=#1c1c1c]#[bg=#89faa0] #{pane_id} #[fg=#89faa0]#[bg=#f6fa89]\
#[fg=#1c1c1c]#[bg=#f6fa89] \uEBA2 #{pane_current_command} \
#[fg=#f6fa89]#{?client_prefix,#[bg=#{@prefix_border_color}],#{?window_zoomed_flag,#[bg=#{@zoom_border_color}],#{?pane_in_mode,#[bg=#{@pane_in_mode_color}],#[bg=#{@normal_border_color}]}}}\
,\
#[fg=#1c1c1c]#[bg=black]\
 #{pane_id}  \uEBA2 #{pane_current_command} \
#[fg=black]#[bg=#1c1c1c]\
}"

# コマンドラインの色を設定する
# set -g message-style fg=white,bg=black,bright

# ステータスバーを設定する
set -g status-left-length 100
set -g status-right-length 100

set -g status-style "#{?client_prefix,\
bg=#{@prefix_border_color} fg=black,\
#{?window_zoomed_flag,bg=#{@zoom_border_color} fg=#{@zoom_border_color},\
#{?pane_in_mode,bg=#{@pane_in_mode_color} fg=#{@pane_in_mode_color},bg=#{@normal_border_color} fg=#{@normal_border_color}}}\
}"

set -g status-left "\
#[bold]\
  #{?client_prefix,#[fg=#{@prefix_border_color}],#{?window_zoomed_flag,#[fg=#{@zoom_border_color}],#{?pane_in_mode,#[fg=#{@pane_in_mode_color}],#[fg=#{@normal_border_color}]}}}#[bg=#89faa0]#[fg=#1c1c1c,bg=#89faa0] \uEBA9 #S \
#[fg=#89faa0,bg=#f6fa89]#[fg=#1c1c1c,bg=#f6fa89] \uE385 %Y-%m-%d(%a) %H:%M #[fg=#f6fa89,bg=#facb89]\
 #{?window_zoomed_flag,#[fg=#1c1c1c]#[bg=#facb89]\uF531 ZOOM ,}#[fg=#facb89,bg=#faa589]\
 #{?pane_synchronized,#[fg=#1c1c1c]#[bg=#faa589]\uF46A SYNC ,}#[fg=#faa589]#{?client_prefix,#[bg=#{@prefix_border_color}],#{?window_zoomed_flag,#[bg=#{@zoom_border_color}],#{?pane_in_mode,#[bg=#{@pane_in_mode_color}],#[bg=#{@normal_border_color}]}}}"

set -g status-right "#[bold]\
#{?pane_in_mode,#[fg=#facb89]\uE0B2#[fg=#1c1c1c]#[bg=#facb89] COPY \
#{?selection_active,#[fg=#1c1c1c]#[bg=#facb89] SELECTING ,}\
#{?search_present,#[fg=#1c1c1c]#[bg=#facb89] SEARCH ,}\
#{?client_prefix,#[bg=#facb89]#[fg=#{@prefix_border_color}]\uE0B2#[bg=#{@prefix_border_color}] ,#[bg=#facb89,fg=#{@normal_border_color}]\uE0B2#[bg=#{@normal_border_color}] }\
,}"

# WIP: 新しいオプション status-format
set -gu status-format ""
# set -g status-format[0] "#[align=left]#{status-left}#[align=right]#{status-right}"

## リフレッシュの間隔を設定する(デフォルト 15秒)
set -g status-interval 60
## ウィンドウリストの位置を中心寄せにする
set -g status-justify centre
## ヴィジュアルノーティフィケーションを有効にする
setw -g monitor-activity on
set -g visual-activity on
## ステータスバーを上部に表示する
set -g status-position top

# Thanks to: https://eiji.page/blog/tmux-conf-intro/
# tmux の history
set-option -g history-limit 10000
# 連続入力できる時間(ミリ秒)
set-option -g repeat-time 200

#############################
# bind -n
#############################

# claude code などのための設定
# https://eiji.page/blog/editprompt-intro/
# bind -n は tmux prefix を要求しないキーマップを設定する
bind -n M-o run-shell 'tmux split-window -v -l 20 \
  -c "#{pane_current_path}" \
  "editprompt --editor nvim --target-pane #{pane_id}"'
bind o run-shell 'tmux split-window -v -p 30 \
  -c "#{pane_current_path}" \
  "editprompt --editor nvim --target-pane #{pane_id}"'

bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R
bind -n M-z resize-pane -Z

# main-verticalレイアウトでメインペインの幅を70%に設定
# 以下のように使う
# tmux new-session -s mysession \; split-window -h \; select-layout main-vertical
set-window-option -g main-pane-width 70%

# prefix + [ のコピーモードを明示的に vi モードとする
set-window-option -g mode-keys vi
# コピーモードで JK を 10倍移動にする
bind-key -T copy-mode-vi J send-keys -N10 -X cursor-down
bind-key -T copy-mode-vi K send-keys -N10 -X cursor-up
# H, Lキーを行頭・行末移動に変更
bind-key -T copy-mode-vi H send -X start-of-line
bind-key -T copy-mode-vi L send -X end-of-line
# カーソル位置に一気にスクロールする
bind-key -T copy-mode-vi 't' send-keys -X scroll-top
bind-key -T copy-mode-vi 'z' send-keys -X scroll-middle
# bind-key -T copy-mode-vi 'b' send-keys -X scroll-bottom

#### Ubuntu

# クリップボードにヤンクする
# https://qiita.com/yuki-k/items/2a28b40f0bd49b2bcb21
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "xsel -ip && xsel -op | xsel -ib"
bind -T copy-mode-vi Enter send -X copy-pipe-and-cancel "xsel -ip && xsel -op | xsel -ib"
